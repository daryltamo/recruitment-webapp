name: recruitment-webapp-ci-cd

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  IMAGE_NAME: recruitment-webapp
  REGISTRY: ghcr.io
  NODE_VERSION: '20'

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install (prod audit)
        run: npm ci

      - name: Lint placeholder
        run: echo "Add ESLint here"

      - name: Test placeholder
        run: echo "Add tests here"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }} 
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_ENV=production

      - name: Summarize
        run: |
          echo "Pushed tags:"
          echo "${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Prepare deploy script
        id: prep
        run: |
          cat > deploy.sh <<'EOF'
          set -euo pipefail
          APP_NAME=recruitment-webapp
          IMAGE=${{ env.REGISTRY }}/${{ github.repository }}:latest
          echo "Pulling image: $IMAGE"
          docker pull "$IMAGE"
          echo "Stopping old container (if any)..."
          docker rm -f "$APP_NAME" 2>/dev/null || true
          mkdir -p /opt/$APP_NAME
          cd /opt/$APP_NAME
          # Write .env if provided as secret ENV_FILE_B64
          if [ -n "${ENV_FILE_B64:-}" ]; then
            echo "$ENV_FILE_B64" | base64 -d > .env
          fi
          # Run container
          docker run -d \
            --name "$APP_NAME" \
            --env-file .env \
            -p 3000:3000 \
            --restart=always \
            "$IMAGE"
          docker image prune -f
          echo "Deployment complete."
          EOF

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: GITHUB_REPOSITORY
          command_timeout: 20m
          script: |
            # Install docker if missing
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi
            # Provide ENV_FILE_B64 into environment for deploy script if secret exists
            export ENV_FILE_B64='${{ secrets.ENV_FILE_B64 }}'
            bash -s < /dev/stdin <<'INNER'
            $(cat deploy.sh)
            INNER

      - name: Post-deploy health check
        uses: jtalk/url-health-check-action@v4
        with:
          url: http://${{ secrets.EC2_HOST }}:3000/
          max-attempts: 10
          retry-delay: 5s
          retry-all: true